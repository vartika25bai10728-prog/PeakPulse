<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">PeakPulse drone symbol</title>
  <desc id="desc">A neuromorphic drone mark with a central pulse-shaped body and four rotor arms.</desc>
  <defs>
    <linearGradient id="pulseStroke" x1="24" y1="132" x2="136" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172111"/>
      <stop offset="0.48" stop-color="#2f6b56"/>
      <stop offset="1" stop-color="#728156"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.42 0 0 0 0 0.34 0 0 0 .24 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g fill="none" stroke="url(#pulseStroke)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path d="M80 42 C89 42 96 51 102 58 L102 102 C96 109 89 118 80 118 C71 118 64 109 58 102 L58 58 C64 51 71 42 80 42 Z"/>
    <path d="M58 58 L34 34"/>
    <path d="M102 58 L126 34"/>
    <path d="M58 102 L34 126"/>
    <path d="M102 102 L126 126"/>
    <path d="M23 43 L43 23"/>
    <path d="M117 23 L137 43"/>
    <path d="M23 117 L43 137"/>
    <path d="M117 137 L137 117"/>
  </g>
  <g fill="#172111" opacity=".72">
    <circle cx="80" cy="42" r="3"/>
    <circle cx="102" cy="80" r="2.5"/>
    <circle cx="80" cy="118" r="3"/>
    <circle cx="58" cy="80" r="2.5"/>
  </g>
</svg>
